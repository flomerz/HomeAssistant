automation:
  - alias: Espresso OFF
    id: espresso_off
    mode: restart
    triggers:
      - trigger: state
        entity_id: switch.espresso
        to: "on"
        for:
          minutes: 60
    actions:
      - action: switch.turn_off
        entity_id: switch.espresso

  - alias: Espresso Heatup
    id: espresso_heatup
    mode: restart
    triggers:
      - trigger: state
        entity_id: switch.espresso
        to: "on"
        for:
          minutes: 5
      - trigger: state
        entity_id: binary_sensor.motion_kitchen
        to: "off"
        for:
          minutes: 3
      - trigger: numeric_state
        entity_id: sensor.temperature_espresso
        above: 75
    conditions:
      - condition: state
        entity_id: switch.espresso
        state: "on"
        for:
          minutes: 5
      - condition: state
        entity_id: binary_sensor.motion_kitchen
        state: "off"
        for:
          minutes: 3
      - condition: numeric_state
        entity_id: sensor.temperature_espresso
        above: 75
    actions:
      - action: switch.turn_off
        entity_id: switch.espresso
      - action: script.notify_google
        data:
          language: it
          message: "espresso isch fertig"
          message_say: "espresso isch fertig"

  - alias: Espresso Weekend
    id: espresso_weekend
    mode: restart
    triggers:
      - trigger: time
        at: "07:30:00"
    conditions:
      - condition: time
        weekday:
          - "sat"
          - "sun"
    actions:
      - action: switch.turn_on
        entity_id: switch.espresso

script:
  entkalken:
    mode: restart
    sequence:
      - repeat:
          while:
            - condition: template
              value_template: "true"
          sequence:
            - action: switch.turn_on
              entity_id: switch.espresso
            - delay:
                minutes: 1
            - action: switch.turn_off
              entity_id: switch.espresso
            - delay:
                minutes: 1
