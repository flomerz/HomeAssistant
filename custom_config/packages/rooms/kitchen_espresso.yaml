input_boolean:
  espresso_standby:
    name: "Espresso Standby"
    icon: mdi:coffee

automation espresso_autooff:
  alias: "Espresso Auto OFF"
  mode: restart
  triggers:
    - trigger: state
      entity_id: switch.espresso
      to: "on"
      for:
        minutes: 30
  actions:
    - action: switch.turn_off
      entity_id: switch.espresso

automation espresso_weekend:
  alias: "Espresso Weekend"
  mode: restart
  triggers:
    - trigger: time
      at: "07:00:00"
  conditions:
    - condition: time
      weekday:
        - sat
        - sun
  actions:
    - action: input_boolean.turn_on
      entity_id: input_boolean.espresso_standby

automation espresso_standby_autooff:
  alias: "Espresso Standby Auto OFF"
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_boolean.espresso_standby
      to: "on"
      for:
        hours: 8
    - trigger: time
      at: "12:30:00"
  actions:
    - action: input_boolean.turn_off
      entity_id: input_boolean.espresso_standby

automation espresso_standby_enable:
  alias: "Espresso - Standby enable"
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_boolean.espresso_standby
      to: "on"
  actions:
    - action: switch.turn_on
      target:
        entity_id: switch.espresso

automation espresso_standby_cold:
  alias: "Espresso - Standby cold"
  mode: restart
  triggers:
    - trigger: numeric_state
      entity_id: sensor.temperature_espresso
      below: 70
  conditions:
    - condition: state
      entity_id: input_boolean.espresso_standby
      state: "on"
    - condition: state
      entity_id: person.florian
      state: "home"
  actions:
    - action: switch.turn_on
      target:
        entity_id: switch.espresso

automation espresso_standby_hot:
  alias: "Espresso - Standby hot"
  mode: restart
  triggers:
    - trigger: numeric_state
      entity_id: sensor.temperature_espresso
      above: 70
  conditions:
    - condition: state
      entity_id: input_boolean.espresso_standby
      state: "on"
  actions:
    - action: switch.turn_off
      target:
        entity_id: switch.espresso

script:
  entkalken:
    mode: restart
    sequence:
      - repeat:
          while:
            - condition: template
              value_template: "true"
          sequence:
            - action: switch.turn_on
              entity_id: switch.espresso
            - delay:
                minutes: 1
            - action: switch.turn_off
              entity_id: switch.espresso
            - delay:
                minutes: 1
